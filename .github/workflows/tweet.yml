name: つむまね 自動投稿

on:
  schedule:
    # ① 朝8時 JST (UTC 23:00 前日) - 日本株 急騰・急落
    - cron: '0 23 * * *'
    # ③ 昼12時 JST (UTC 03:00) - 海外株 急騰・急落
    - cron: '0 3 * * *'
    # ② 夜20時 JST (UTC 11:00) - 期待銘柄TOP10
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: '投稿タイプ (morning / overseas / evening / test)'
        required: true
        default: 'morning'

jobs:
  tweet:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存関係をインストール
        run: pip install tweepy yfinance pandas pytz

      # テスト投稿（静的ツイート）- 認証確認用
      - name: テスト投稿（認証確認）
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'test'
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python scripts/tweet.py

      # ① 朝8時 JST - 日本株 急騰・急落TOP5（100株価格付き）
      - name: 朝ツイート（日本株 急騰・急落）
        if: >
          (github.event_name == 'schedule' && github.event.schedule == '0 23 * * *') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'morning')
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: cd scripts && python tweet_morning.py

      # ③ 昼12時 JST - 海外株 急騰・急落TOP5（国名付き）
      - name: 昼ツイート（海外株 急騰・急落）
        if: >
          (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'overseas')
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: cd scripts && python tweet_overseas.py

      # ② 夜20時 JST - 期待銘柄TOP10（1ヶ月モメンタム）
      - name: 夜ツイート（期待銘柄TOP10）
        if: >
          (github.event_name == 'schedule' && github.event.schedule == '0 11 * * *') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'evening')
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: cd scripts && python tweet_evening.py
