name: つむまね 自動投稿

on:
  schedule:
    # 毎朝9:00 JST (UTC 00:00) - AI自動生成
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: '投稿タイプ (auto / release / test)'
        required: true
        default: 'auto'

jobs:
  tweet:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存関係をインストール
        run: pip install tweepy yfinance pandas pytz requests beautifulsoup4 anthropic

      # AI自動生成投稿（毎朝9:00 JST）
      - name: AI自動生成ツイート
        if: >
          (github.event_name == 'schedule') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'auto')
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cd scripts && python tweet_auto.py

      # リリース告知（手動のみ）
      - name: リリース告知ツイート
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'release'
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python scripts/tweet_release.py

      # テスト投稿（認証確認用・手動のみ）
      - name: テスト投稿（認証確認）
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'test'
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python scripts/tweet.py

      # エラー時メール通知
      - name: エラー通知メール
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "❌ つむまねBot エラー発生 [${{ github.event.inputs.type || 'スケジュール' }}]"
          to: chikara0323@gmail.com
          from: "つむまねBot <${{ secrets.GMAIL_USERNAME }}>"
          body: |
            つむまねSNSボットでエラーが発生しました。

            ▼ エラーログを確認（クリックで詳細へ）
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ─────────────────────────────
            ワークフロー : ${{ github.workflow }}
            トリガー     : ${{ github.event_name }}
            投稿タイプ   : ${{ github.event.inputs.type || 'スケジュール自動実行' }}
            実行ID       : ${{ github.run_id }}
            ─────────────────────────────

            このメールはGitHub Actionsから自動送信されています。
